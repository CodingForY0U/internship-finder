<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Internship Finder</title>
  <style>
/* Internship Finder — clean editorial neutral */
:root {
  --bg: #FAFAF7;
  --bg-elev: #FFFFFF;
  --ink: #18181B;
  --ink-2: #3F3F46;
  --muted: #71717A;
  --muted-2: #A1A1AA;
  --line: #E7E5E0;
  --line-2: #EFEDE8;
  --accent: oklch(55% 0.08 150);
  --accent-soft: oklch(96% 0.025 150);
  --accent-ink: oklch(38% 0.07 150);
  --warn: oklch(60% 0.12 55);
  --warn-soft: oklch(97% 0.03 75);
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-sm: 0 1px 0 rgba(24,24,27,.04), 0 1px 2px rgba(24,24,27,.04);
  --shadow-md: 0 4px 14px rgba(24,24,27,.06), 0 1px 0 rgba(24,24,27,.04);
  --shadow-lg: 0 20px 60px rgba(24,24,27,.18);
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "IBM Plex Mono", Menlo, monospace;
  --pad: 16px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  color: var(--ink);
  background: var(--bg);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

/* ───── App shell ───── */
.app {
  display: grid;
  grid-template-rows: 56px 1fr;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  letter-spacing: -0.01em;
  font-size: 15px;
}
.brand-mark {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--ink);
  position: relative;
  display: grid; place-items: center;
}
.brand-mark::before {
  content: "";
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
}
.brand small {
  color: var(--muted);
  font-weight: 400;
  font-size: 12px;
  margin-left: 6px;
  padding-left: 10px;
  border-left: 1px solid var(--line);
}

.search {
  flex: 1;
  max-width: 480px;
  position: relative;
}
.search input {
  width: 100%;
  height: 34px;
  padding: 0 12px 0 34px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--bg);
  outline: none;
  transition: border-color .15s, background .15s;
}
.search input:focus { border-color: var(--ink); background: var(--bg-elev); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px;
  opacity: 0.5;
}

.view-toggle {
  display: inline-flex;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
}
.view-toggle button {
  appearance: none;
  border: 0;
  background: transparent;
  padding: 5px 12px;
  border-radius: 5px;
  font-size: 12.5px;
  color: var(--muted);
  font-weight: 500;
}
.view-toggle button.on {
  background: var(--bg-elev);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}

.saved-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 12px;
  border-radius: 8px;
  background: var(--bg);
  border: 1px solid var(--line);
  color: var(--ink-2);
  font-size: 12.5px;
  font-weight: 500;
}
.saved-pill .num {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 11.5px;
  background: var(--ink);
  color: white;
  border-radius: 4px;
  padding: 1px 5px;
  min-width: 16px;
  text-align: center;
}

/* ───── Main content ───── */
.main {
  display: grid;
  grid-template-columns: 260px 1fr;
  overflow: hidden;
}

.sidebar {
  border-right: 1px solid var(--line);
  background: var(--bg-elev);
  padding: 18px 18px 24px;
  overflow-y: auto;
}
.sidebar h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 600;
  margin: 0 0 10px;
}
.filter-group { margin-bottom: 22px; }
.filter-group:last-of-type { margin-bottom: 0; }

.chip-row {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.chip {
  appearance: none;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  color: var(--ink-2);
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  transition: all .12s;
}
.chip:hover { border-color: var(--ink-2); }
.chip.on {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}
.chip.on.accent {
  background: var(--accent);
  border-color: var(--accent);
}

.check {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
  color: var(--ink-2);
  padding: 4px 0;
  cursor: pointer;
}
.check input { appearance: none; width: 16px; height: 16px;
  border: 1.5px solid var(--line); border-radius: 4px;
  display: inline-grid; place-items: center; cursor: pointer;
  transition: all .12s; flex-shrink: 0;
}
.check input:checked { background: var(--accent); border-color: var(--accent); }
.check input:checked::after {
  content: "";
  width: 8px; height: 4px;
  border-left: 1.5px solid white;
  border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translate(1px,-1px);
}

.slider-row { display: flex; align-items: center; gap: 10px; }
.slider-row input[type=range] {
  flex: 1; height: 4px; -webkit-appearance: none;
  background: var(--line); border-radius: 2px; outline: none;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--ink);
  cursor: pointer;
}
.slider-row .val {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink);
  min-width: 32px; text-align: right;
  font-variant-numeric: tabular-nums;
}

.clear-btn {
  appearance: none; border: 0; background: transparent;
  color: var(--muted); font-size: 12px; font-weight: 500;
  padding: 4px 0; cursor: pointer; text-decoration: underline;
}
.clear-btn:hover { color: var(--ink); }

/* ───── Results ───── */
.results {
  overflow-y: auto;
  padding: 22px 24px 80px;
}
.results-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 18px;
}
.results-count {
  font-size: 13px; color: var(--muted);
}
.results-count strong {
  color: var(--ink); font-weight: 600;
  font-family: var(--font-mono); font-variant-numeric: tabular-nums;
}
.sort {
  display: flex; align-items: center; gap: 6px; font-size: 12.5px;
  color: var(--muted);
}
.sort select {
  appearance: none;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  padding: 4px 22px 4px 8px;
  border-radius: 6px;
  font-size: 12.5px;
  color: var(--ink);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3 5l3 3 3-3' stroke='%2371717A' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat: no-repeat;
  background-position: right 6px center;
  background-size: 12px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}
.grid.dense { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }

/* ───── Job card ───── */
.card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .15s;
  position: relative;
}
.card:hover {
  border-color: var(--ink-2);
  box-shadow: var(--shadow-md);
}
.card.dense { padding: 13px; gap: 10px; }
.card.applied {
  border-color: var(--accent);
  background: linear-gradient(0deg, var(--accent-soft) 0%, var(--bg-elev) 60%);
}
.card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.card-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--ink);
  margin: 0;
  letter-spacing: -0.005em;
}
.card-company {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
}
.card-meta {
  display: flex; flex-wrap: wrap; gap: 6px;
  font-size: 11.5px;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--bg);
  color: var(--ink-2);
  border: 1px solid var(--line);
  font-weight: 500;
  font-size: 11px;
}
.tag.sustain {
  background: var(--accent-soft);
  color: var(--accent-ink);
  border-color: oklch(90% 0.04 150);
}
.tag.mentor {
  background: var(--warn-soft);
  color: oklch(42% 0.1 55);
  border-color: oklch(90% 0.05 70);
}
.tag.dot::before {
  content: "";
  display: inline-block;
  width: 4px; height: 4px; border-radius: 50%;
  background: currentColor; opacity: 0.7;
}

.card-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 10px;
  border-top: 1px solid var(--line-2);
  gap: 10px;
}
.card-sources {
  font-size: 11px;
  color: var(--muted-2);
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
}
.card-actions { display: flex; gap: 4px; }
.icon-btn {
  appearance: none;
  border: 1px solid transparent;
  background: transparent;
  width: 28px; height: 28px;
  border-radius: 6px;
  display: grid; place-items: center;
  color: var(--muted);
  transition: all .12s;
}
.icon-btn:hover { background: var(--bg); color: var(--ink); border-color: var(--line); }
.icon-btn.on { color: var(--ink); background: var(--accent-soft); border-color: oklch(88% 0.05 150); }
.icon-btn svg { width: 16px; height: 16px; }

/* ───── Match score visuals ───── */
.match-ring {
  width: 44px; height: 44px;
  position: relative;
  flex-shrink: 0;
}
.match-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.match-ring .track { fill: none; stroke: var(--line); stroke-width: 4; }
.match-ring .fill { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
.match-ring .num {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}
.match-ring.low .fill { stroke: var(--muted-2); }
.match-ring.low .num { color: var(--muted); }

.match-bar {
  flex-shrink: 0;
  text-align: right;
  min-width: 80px;
}
.match-bar .num {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.match-bar .num sub { font-size: 10px; color: var(--muted); font-weight: 400; vertical-align: baseline; }
.match-bar .track {
  margin-top: 4px;
  height: 3px;
  background: var(--line);
  border-radius: 2px;
  overflow: hidden;
}
.match-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .6s ease; }
.match-bar.low .fill { background: var(--muted-2); }

.match-num-only {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.03em;
  color: var(--ink);
  line-height: 1;
}
.match-num-only sub { font-size: 11px; color: var(--muted); font-weight: 400; vertical-align: baseline; margin-left: 1px; }
.match-num-only.low { color: var(--muted-2); }

/* ───── Drawer ───── */
.drawer-backdrop {
  position: fixed; inset: 0;
  background: rgba(24,24,27,.32);
  z-index: 100;
  animation: fadeIn .18s ease;
}
@keyframes fadeIn { from { opacity: 0; } }

.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(560px, 92vw);
  background: var(--bg-elev);
  z-index: 101;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slideIn .25s cubic-bezier(.2,.7,.2,1);
}
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } }

.drawer-head {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
}
.drawer-head h2 {
  margin: 0;
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.drawer-head .company {
  margin-top: 4px;
  font-size: 13px;
  color: var(--muted);
}
.drawer-close {
  appearance: none;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  width: 30px; height: 30px;
  border-radius: 8px;
  display: grid; place-items: center;
  color: var(--ink-2);
  flex-shrink: 0;
}
.drawer-close:hover { background: var(--bg); }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px 24px 100px;
}
.drawer-body section { margin-bottom: 24px; }
.drawer-body h4 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 600;
  margin: 0 0 10px;
}

.score-breakdown {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 16px;
  background: var(--bg);
}
.score-breakdown .total {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 12px;
}
.score-breakdown .total .label {
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); font-weight: 600;
}
.score-breakdown .total .val {
  font-family: var(--font-mono);
  font-size: 28px; font-weight: 600; letter-spacing: -0.03em;
}
.score-breakdown .total .val sub { font-size: 12px; color: var(--muted); font-weight: 400; }
.score-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
}
.score-row + .score-row { border-top: 1px dashed var(--line-2); }
.score-row .label { color: var(--ink-2); display: flex; align-items: center; gap: 8px; }
.score-row .label .dot { width: 7px; height: 7px; border-radius: 50%; }
.score-row .label .dot.met { background: var(--accent); }
.score-row .label .dot.miss { background: var(--muted-2); }
.score-row .points {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 12px;
  color: var(--muted);
}
.score-row.met .points { color: var(--accent-ink); }

.meta-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border-top: 1px solid var(--line-2);
}
.meta-grid > div {
  padding: 10px 0;
  border-bottom: 1px solid var(--line-2);
  font-size: 13px;
}
.meta-grid .k { color: var(--muted); font-size: 11.5px; margin-bottom: 2px; }
.meta-grid .v { color: var(--ink); font-weight: 500; }

.checklist { display: flex; flex-direction: column; gap: 4px; }
.checklist .check { font-size: 13.5px; padding: 6px 0; }
.checklist .check.done { color: var(--muted); }
.checklist .check.done .label { text-decoration: line-through; }

.cover-letter {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 16px;
  background: var(--bg);
}
.cover-letter textarea {
  width: 100%;
  min-height: 160px;
  border: 0;
  background: transparent;
  resize: vertical;
  outline: none;
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
  white-space: pre-wrap;
}
.cover-letter textarea::placeholder { color: var(--muted-2); }
.cover-letter .row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line-2);
  gap: 8px;
}

.btn {
  appearance: none;
  border: 1px solid var(--ink);
  background: var(--ink);
  color: white;
  padding: 7px 14px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: opacity .15s, transform .05s;
}
.btn:hover { opacity: .88; }
.btn:active { transform: translateY(1px); }
.btn.ghost {
  background: transparent;
  color: var(--ink);
  border-color: var(--line);
}
.btn.ghost:hover { border-color: var(--ink-2); opacity: 1; }
.btn.accent {
  background: var(--accent);
  border-color: var(--accent);
}
.btn.sm { padding: 5px 10px; font-size: 12px; }
.btn[disabled] { opacity: .5; cursor: not-allowed; }

.drawer-foot {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 14px 24px;
  border-top: 1px solid var(--line);
  background: var(--bg-elev);
  display: flex; gap: 10px;
}
.drawer-foot .btn { flex: 1; justify-content: center; }

/* ───── Calendar ───── */
.cal {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}
.cal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
}
.cal-head .month {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.cal-nav { display: flex; gap: 4px; }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.cal-dow {
  padding: 8px 10px;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 600;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
}
.cal-cell {
  min-height: 92px;
  border-right: 1px solid var(--line-2);
  border-bottom: 1px solid var(--line-2);
  padding: 6px 8px;
  position: relative;
  font-size: 12px;
}
.cal-cell.dim { background: var(--bg); color: var(--muted-2); }
.cal-cell .d {
  font-family: var(--font-mono);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  font-weight: 500;
}
.cal-cell.today .d {
  color: white;
  background: var(--ink);
  width: 20px; height: 20px;
  border-radius: 50%;
  display: inline-grid; place-items: center;
  margin-left: -4px;
}
.cal-event {
  display: block;
  margin-top: 4px;
  padding: 3px 5px;
  background: var(--accent-soft);
  color: var(--accent-ink);
  border-left: 2px solid var(--accent);
  border-radius: 3px;
  font-size: 11px;
  line-height: 1.3;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  cursor: pointer;
  font-weight: 500;
}
.cal-event:hover { filter: brightness(0.97); }
.cal-event.applied { background: oklch(95% 0.02 250); color: var(--ink-2); border-left-color: var(--muted-2); }
.cal-event-more { font-size: 10.5px; color: var(--muted); margin-top: 3px; cursor: pointer; }
.cal-event-more:hover { color: var(--ink); }

.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty h3 { color: var(--ink); font-weight: 600; margin: 0 0 6px; }
.empty p { margin: 0; font-size: 13px; }

/* Accent palette switch (via Tweaks) */
body[data-accent="green"] { --accent: oklch(55% 0.08 150); --accent-soft: oklch(96% 0.025 150); --accent-ink: oklch(38% 0.07 150); }
body[data-accent="slate"] { --accent: oklch(48% 0.04 250); --accent-soft: oklch(96% 0.015 250); --accent-ink: oklch(35% 0.04 250); }
body[data-accent="ink"]   { --accent: oklch(28% 0 0);     --accent-soft: oklch(96% 0 0);     --accent-ink: oklch(22% 0 0); }
body[data-accent="terra"] { --accent: oklch(58% 0.1 45);  --accent-soft: oklch(97% 0.03 50); --accent-ink: oklch(42% 0.09 45); }
  </style>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div className="twk-panel">
        <div className="twk-hd">
          <b>{title}</b>
          <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-seg" role="radiogroup">
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio"
                  aria-checked={o.value === value}
                  onClick={() => onChange(o.value)}>
            {o.label}
          </button>
        ))}
      </div>
    </div>
  );
}

function TweakColor({ label, value, options, onChange }) {
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip"
                    data-on={on ? '1' : '0'}
                    style={{ background: o }}
                    title={o}
                    onClick={() => onChange(o)}>
              {on && (
                <svg viewBox="0 0 14 14" aria-hidden="true">
                  <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
                        strokeLinecap="round" strokeLinejoin="round" stroke="#fff" />
                </svg>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

    },
    {
      key: "start",
      label: "September 2026 start",
      points: 20,
      met: job.startMonth === "Sep 2026",
      detail: `Starts ${job.startMonth}`,
    },
  ];
  const total = breakdown.reduce((s, b) => s + (b.met ? b.points : 0), 0);
  return { total, breakdown };
}

const MatchScore = ({ score, variant = "ring" }) => {
  const low = score < 60;
  if (variant === "bar") {
    return (
      <div className={"match-bar" + (low ? " low" : "")}>
        <div className="num">{score}<sub>/100</sub></div>
        <div className="track"><div className="fill" style={{ width: score + "%" }}/></div>
      </div>
    );
  }
  if (variant === "number") {
    return (
      <div className={"match-num-only" + (low ? " low" : "")}>
        {score}<sub>/100</sub>
      </div>
    );
  }
  const r = 18, c = 2 * Math.PI * r;
  const off = c - (score / 100) * c;
  return (
    <div className={"match-ring" + (low ? " low" : "")}>
      <svg viewBox="0 0 44 44">
        <circle className="track" cx="22" cy="22" r={r}/>
        <circle className="fill" cx="22" cy="22" r={r}
          strokeDasharray={c} strokeDashoffset={off}/>
      </svg>
      <div className="num">{score}</div>
    </div>
  );
};

const Calendar = ({ jobs, applied, onPick }) => {
  const earliest = jobs.reduce((min, j) => {
    const d = new Date(j.deadline);
    return !min || d < min ? d : min;
  }, null) || new Date();
  const [view, setView] = React.useState(() => ({
    y: earliest.getFullYear(), m: earliest.getMonth()
  }));

  const first = new Date(view.y, view.m, 1);
  const start = new Date(first);
  start.setDate(1 - first.getDay());
  const days = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    days.push(d);
  }
  const today = new Date();
  const monthLabel = first.toLocaleDateString("en-SG", { month: "long", year: "numeric" });
  const eventsBy = {};
  jobs.forEach(j => { (eventsBy[j.deadline] = eventsBy[j.deadline] || []).push(j); });
  const iso = (d) => d.toISOString().slice(0,10);

  return (
    <div className="cal">
      <div className="cal-head">
        <div className="month">{monthLabel}</div>
        <div className="cal-nav">
          <button className="icon-btn"
                  onClick={() => setView(v => ({ y: v.m === 0 ? v.y-1 : v.y, m: v.m === 0 ? 11 : v.m-1 }))}>
            <Icon name="chevronLeft"/>
          </button>
          <button className="icon-btn"
                  onClick={() => setView({ y: today.getFullYear(), m: today.getMonth() })}>
            <span style={{ fontSize: 11.5, padding: "0 4px" }}>Today</span>
          </button>
          <button className="icon-btn"
                  onClick={() => setView(v => ({ y: v.m === 11 ? v.y+1 : v.y, m: v.m === 11 ? 0 : v.m+1 }))}>
            <Icon name="chevronRight"/>
          </button>
        </div>
      </div>
      <div className="cal-grid">
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => (
          <div key={d} className="cal-dow">{d}</div>
        ))}
        {days.map((d, i) => {
          const dim = d.getMonth() !== view.m;
          const isToday = iso(d) === iso(today);
          const evts = eventsBy[iso(d)] || [];
          const shown = evts.slice(0, 2);
          const extra = evts.length - shown.length;
          return (
            <div key={i} className={"cal-cell" + (dim ? " dim" : "") + (isToday ? " today" : "")}>
              <div className="d">{d.getDate()}</div>
              {shown.map(j => (
                <div key={j.id}
                     className={"cal-event" + (applied[j.id] ? " applied" : "")}
                     title={`${j.title} — ${j.company}`}
                     onClick={() => onPick(j)}>
                  {j.companyShort} · {j.title.split(" ").slice(0,3).join(" ")}
                </div>
              ))}
              {extra > 0 && (
                <div className="cal-event-more" onClick={() => onPick(evts[shown.length])}>
                  +{extra} more
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

                      matchVariant={t.matchVariant}
                      onOpen={() => setOpenJob(j)}
                      onToggleSave={() => toggleSave(j.id)}
                      onToggleApplied={() => toggleApplied(j.id)}
                    />
                  ))}
                </div>
              )}
            </>
          ) : (
            <>
              <div className="results-header">
                <div className="results-count">
                  <strong>{filtered.length}</strong> upcoming deadlines
                </div>
                <div className="sort">
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 6, marginRight: 8 }}>
                    <span style={{ width: 10, height: 10, background: "var(--accent-soft)", borderLeft: "2px solid var(--accent)" }}/>
                    Open
                  </span>
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                    <span style={{ width: 10, height: 10, background: "oklch(95% 0.02 250)", borderLeft: "2px solid var(--muted-2)" }}/>
                    Applied
                  </span>
                </div>
              </div>
              <Calendar jobs={filtered} applied={applied} onPick={(j) => setOpenJob(j)}/>
            </>
          )}
        </div>
      </div>

      {/* Detail drawer */}
      {openJob && (
        <Drawer
          job={openJob}
          saved={!!saved[openJob.id]}
          applied={!!applied[openJob.id]}
          onClose={() => setOpenJob(null)}
          onToggleSave={() => toggleSave(openJob.id)}
          onToggleApplied={() => toggleApplied(openJob.id)}
        />
      )}

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection label="Theme"/>
        <TweakColor
          label="Accent"
          value={t.accent}
          options={["#2E9461", "#5A6B82", "#18181B", "#C97A3F"]}
          onChange={(v) => setTweak("accent", v)}
        />
        <TweakSection label="Layout"/>
        <TweakRadio
          label="Card density"
          value={t.density}
          options={["comfy", "dense"]}
          onChange={(v) => setTweak("density", v)}
        />
        <TweakRadio
          label="Match score"
          value={t.matchVariant}
          options={["ring", "bar", "number"]}
          onChange={(v) => setTweak("matchVariant", v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
